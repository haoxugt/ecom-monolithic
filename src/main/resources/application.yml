spring:
  application:
    name: ecom-monolithic
  datasource:
    url: jdbc:postgresql://localhost:5432/ecom-database
    username: haoxugt
    password: password
  jpa:
    database: POSTGRESQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: update

management:
  endpoints:
    web:
      exposure:
        include: beans,health
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: ecom
    description: App built by us
    version: 1.0.0




